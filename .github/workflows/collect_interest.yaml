name: Collect Interest

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  do-request:
    runs-on: ubuntu-latest
    steps:
      - name: Do request
        run: |
          curl 'https://deltaruneboards.net/index.php?act=store&code=dobank&type=collect' \
            --compressed \
            -X POST \
            -H 'User-Agent: ${{ secrets.USER_AGENT }}' \
            -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' \
            -H 'Accept-Language: en-US,en;q=0.9' \
            -H 'Accept-Encoding: gzip, deflate, br, zstd' \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            -H 'Origin: https://deltaruneboards.net' \
            -H 'Connection: keep-alive' \
            -H 'Referer: https://deltaruneboards.net/index.php?act=store&code=bank' \
            -H 'Cookie: ${{ secrets.COOKIE_DATA }}' \
            -H 'Upgrade-Insecure-Requests: 1' \
            -H 'Sec-Fetch-Dest: document' \
            -H 'Sec-Fetch-Mode: navigate' \
            -H 'Sec-Fetch-Site: same-origin' \
            -H 'Sec-Fetch-User: ?1' \
            -H 'Priority: u=0, i' \
            --data-raw 'auth_key=${{ secrets.AUTH_KEY }}&collect=Collect+Interest'
